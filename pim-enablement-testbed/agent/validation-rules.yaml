# PIM Enablement — Validation Rules
#
# Schema v3 (Wave B — 2026-05-11): adds real Jira ticket validation predicates
# (PIM-005..PIM-013 from Zafin's Deterministic Rule Pack). The Wave A vocabulary
# (Approve / Reject with Remarks / Human Review Needed) and HumanReview-trumps-
# Reject aggregation are unchanged.
#
# Each rule has: id, description, kind (hard|soft), terminal (bool),
# decision_on_fail (Reject|HumanReview), and a typed predicate.
#
# Verdict computation (per Zafin sections 8 and 9):
#   1. If ANY rule fails with decision_on_fail=HumanReview ->
#        final verdict = "Human Review Needed" (TRUMPS Reject).
#   2. Else if ANY rule fails with decision_on_fail=Reject ->
#        final verdict = "Reject with Remarks".
#   3. Else all rules pass ->
#        final verdict = "Approve".
#
# Predicates supported:
#   - ticket_id_format_match: regex                         # Wave B — PIM-005 (format check before Jira call)
#   - ticket_exists: bool                                   # Wave B — PIM-006 (jira_get_issue 200 vs 404)
#   - ticket_state_in: list[str]                            # status whitelist (open/in-progress/etc.)
#   - ticket_state_not_in: list[str]                        # Wave B — PIM-007 (closed/done/cancelled blocklist)
#   - ticket_type_in: list[str]                             # Wave B — PIM-008 (canonical ticket type taxonomy)
#   - ticket_age_max_hours: int                             # ticket creation freshness (single value)
#   - ticket_age_max_hours_by_type: map[str, int]           # Wave B — PIM-009 (per-type freshness from Zafin Table 3)
#   - requester_assignee_match: bool                        # legacy assignee-only check
#   - requester_linked_to_ticket: { kinds: list[str] }      # Wave B — PIM-013 (reporter|assignee|watcher|team-member)
#   - group_membership_any: list[str]                       # group object IDs
#   - role_in_allowlist: list[str]                          # role display names or definition IDs
#   - role_in_high_risk_catalog: list[str]                  # Wave A — Zafin Table 4
#   - scope_prefix_in_allowlist: list[str]
#   - scope_is_tenant_root: bool                            # Wave A — Zafin PIM-026
#   - scope_is_management_group: bool                       # Wave A — Zafin PIM-027
#   - activation_duration_max_hours: int
#   - recent_activations_max: { window_hours: int, count: int }
#
# Wave B testbed scope: validates the WIRING (jira_get_issue calls, status reads,
# type checks, age math) against the existing aq-r2d2.atlassian.net SCRUM project.
# Production-environment gaps (real ticket type taxonomy, SSO-bridged identity
# mapping, multi-project key prefixes) are deferred and documented in
# WAVE-B-LIMITATIONS.md.
#
# PLACEHOLDER values remain where Zafin must supply real allowlists (Wave C).

version: 3
rules:
  # ============================================================================
  # Ticket validation chain (Wave B — PIM-005 through PIM-013)
  # Each predicate runs independently. Earlier failures do NOT short-circuit
  # later checks; the agent reports every FAIL so the audit ticket carries the
  # full diagnostic.
  # ============================================================================

  - id: R001-ticket-id-format
    description: |
      Wave B / PIM-005. The ticketInfo.ticketNumber on the PIM request must
      look like a Jira issue key (PROJECT-NUMBER, e.g. SCRUM-42). This is a
      pure format check — no Jira call. Fails fast on free-text tickets like
      "TESTBED-SCHED-D" so downstream Jira predicates short-circuit cleanly.
    kind: hard
    terminal: false
    decision_on_fail: Reject                     # Zafin PIM-005: malformed/missing ticket id -> Reject.
    predicate:
      type: ticket_id_format_match
      pattern: "^[A-Z][A-Z0-9_]+-[1-9][0-9]*$"

  - id: R001b-ticket-exists
    description: |
      Wave B / PIM-006. The Jira ticket whose key was supplied in the PIM
      request must exist and be readable by the agent's Jira credential.
      Implementation: agent calls jira_get_issue(ticketId); 404 / 401 / 403 ->
      FAIL.
    kind: hard
    terminal: false
    decision_on_fail: Reject                     # Zafin PIM-006: ticket not found -> Reject.
    predicate:
      type: ticket_exists
      value: true

  - id: R001c-ticket-status-active
    description: |
      Wave B / PIM-007. Ticket must be in an actionable status. Closed or
      otherwise terminal statuses indicate the work is finished and the role
      activation is no longer justified. Block-list (not whitelist) so future
      custom workflows don't silently FAIL on unknown active states.
    kind: hard
    terminal: false
    decision_on_fail: Reject                     # Zafin PIM-007: closed ticket -> Reject.
    predicate:
      type: ticket_state_not_in
      values: ["Done", "Closed", "Cancelled", "Rejected", "Duplicate", "Resolved", "Won't Do"]

  - id: R001d-ticket-type-valid
    description: |
      Wave B / PIM-008. Ticket type must indicate operational work that could
      reasonably justify a privileged role activation. Non-operational types
      (e.g. "Epic", "Sub-task", "Story" used for backlog grooming) route to
      Human Review rather than Reject — sometimes the ticket is correct but
      mistyped.
    kind: hard
    terminal: false
    decision_on_fail: HumanReview                # Zafin PIM-008: unusual ticket type -> Human Review (may still be valid work).
    predicate:
      type: ticket_type_in
      # Aspirational Zafin-canonical types. The aq-r2d2 testbed uses the
      # default SCRUM types (Story / Task / Bug / Epic / Subtask) — see
      # WAVE-B-LIMITATIONS.md for the testbed mapping. The agent applies the
      # mapping at evaluation time so this allowlist stays Zafin-canonical.
      values:
        - "Incident"
        - "Change Request"
        - "Service Request"
        - "Deployment"
        - "Problem"
        - "Security Exception"

  - id: R002-ticket-recent
    description: |
      Wave B / PIM-009. Ticket must be recent enough that the work it describes
      could plausibly still be in flight. Defaults to 72h. Wave C will replace
      this with the per-ticket-type table from Zafin section 7 (Incident: 24h,
      Change: 168h, etc.) via ticket_age_max_hours_by_type.
    kind: hard
    terminal: false
    decision_on_fail: HumanReview                # Zafin PIM-009: stale tickets -> Human Review (may still represent valid work).
    predicate:
      type: ticket_age_max_hours
      value: 72

  - id: R003-requester-linked-to-ticket
    description: |
      Wave B / PIM-013. The PIM requester (Entra principal) must be related
      to the Jira ticket as reporter, assignee, or watcher. The agent uses
      the identity-mapping table in agent/identity-map.yaml to translate the
      Entra UPN into an Atlassian accountId before comparing. Production
      environments will replace this with SSO-bridged identity lookups (see
      WAVE-B-LIMITATIONS.md, caveat 2).
    kind: hard
    terminal: false
    decision_on_fail: HumanReview                # Wave B — relaxed from Reject to HumanReview because identity-mapping table is intentionally fragile in the testbed.
    predicate:
      type: requester_linked_to_ticket
      kinds: ["reporter", "assignee", "watcher"]

  - id: R004-group-membership
    description: Requester must belong to one of the approved on-call groups.
    kind: hard
    terminal: false
    decision_on_fail: Reject                     # Zafin PIM-014: not in authorized group -> Reject.
    predicate:
      type: group_membership_any
      values:
        # TEMP -- test-tenant on-call group (MngEnvMCAP094150). Replace with
        # Zafin's real group IDs before partner handoff:
        #   - "PLACEHOLDER-group-objectid-oncall-prod"
        #   - "PLACEHOLDER-group-objectid-oncall-platform"
        - "a19dbeba-9826-4954-bde8-effef5dc7e85"  # test-tenant-oncall

  - id: R005-role-allowlist
    description: Requested role must be in the approved role list for the requester team/function.
    kind: hard
    terminal: false
    decision_on_fail: Reject                     # Zafin PIM-017: role not in allowlist -> Reject.
    predicate:
      type: role_in_allowlist
      values:
        - "Reader"
        - "Monitoring Reader"
        - "Log Analytics Reader"
        - "Contributor"                          # PLACEHOLDER -- Zafin Wave C to confirm.

  - id: R005b-role-high-risk
    description: |
      Zafin Table 4 -- High-risk role catalog. Even if a role passes R005,
      high-risk and critical roles must route to a human approver.
    kind: hard
    terminal: false
    decision_on_fail: HumanReview                # Zafin PIM-018 + Table 4: high-risk/critical -> Human Review Needed (NOT Reject).
    predicate:
      type: role_in_high_risk_catalog
      values:
        - "Owner"
        - "User Access Administrator"
        - "Global Administrator"
        - "Privileged Role Administrator"
        - "Conditional Access Administrator"
        - "Security Administrator"
        - "Key Vault Administrator"
        - "Billing Administrator"
        - "Compliance Administrator"

  - id: R006-scope-allowlist
    description: Requested scope must start with an approved prefix.
    kind: hard
    terminal: false
    decision_on_fail: Reject                     # Zafin PIM-022: team not authorized for scope -> Reject.
    predicate:
      type: scope_prefix_in_allowlist
      values:
        - "/subscriptions/PLACEHOLDER-sub-id/resourceGroups/rg-prod-"
        - "/subscriptions/PLACEHOLDER-sub-id/resourceGroups/rg-platform-"

  - id: R006b-scope-tenant-root
    description: Tenant-wide ("/") scope requires manual review per Zafin PIM-026.
    kind: hard
    terminal: false
    decision_on_fail: HumanReview                # Zafin PIM-026: tenant/identity-wide -> Human Review Needed.
    predicate:
      type: scope_is_tenant_root
      value: true

  - id: R006c-scope-mgmt-group
    description: Management-group / root scope requires manual review per Zafin PIM-027.
    kind: hard
    terminal: false
    decision_on_fail: HumanReview                # Zafin PIM-027: MG/root scope -> Human Review Needed.
    predicate:
      type: scope_is_management_group
      value: true

  - id: R007-duration-cap
    description: Activation duration must not exceed 8 hours (single-cap; Wave C will replace with min() across role/scope/ticket/change-window).
    kind: soft
    terminal: false
    decision_on_fail: Reject                     # Zafin DUR-003: exceeds role/scope max -> Reject.
    predicate:
      type: activation_duration_max_hours
      value: 8

  - id: R008-activation-frequency
    description: Requester has not activated this role more than 3 times in the last 24 hours.
    kind: soft
    terminal: false
    decision_on_fail: HumanReview                # Zafin PIM-041: repeated requests above threshold -> Human Review Needed.
    predicate:
      type: recent_activations_max
      window_hours: 24
      count: 3
